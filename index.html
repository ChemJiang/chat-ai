<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>哥哥</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <style>
        :root {
            --bg-color: #f3f3f3;
            --sidebar-bg: #ffffff;
            --chat-bg: #ffffff;
            --user-bubble: #007aff;
            --ai-bubble: #e9e9eb;
            --text-dark: #000000;
            --text-light: #ffffff;
            --border-color: #d1d1d6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; background-color: var(--bg-color); }

        /* 侧边栏 */
        #sidebar {
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 100;
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border-color); }
        .new-chat-btn { width: 100%; padding: 10px; background: var(--user-bubble); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        
        #chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        /* 修复：对话列表项布局与防挤压 */
        .chat-item {
            padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 5px;
            display: flex; justify-content: space-between; align-items: center; 
        }
        .chat-item:hover { background: #f0f0f5; }
        .chat-item.active { background: #e5e5ea; font-weight: bold; }
        
        /* 标题文本溢出隐藏 */
        .chat-title {
            flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 8px;
        }
        
        /* 悬浮操作按钮组 */
        .chat-actions {
            display: none; gap: 8px; flex-shrink: 0; /* 防止按钮被挤扁 */
        }
        .chat-item:hover .chat-actions { display: flex; }
        .action-btn { background: none; border: none; cursor: pointer; padding: 0 2px; font-size: 14px; }
        .delete-btn { color: #ff3b30; }

        .sidebar-footer { padding: 15px; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 8px; }
        .footer-btn { padding: 8px; background: #e5e5ea; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; text-align: center;}

        /* 主聊天区域 */
        #main-chat { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg); position: relative; }
        .chat-header {
            padding: 15px 20px; border-bottom: 1px solid var(--border-color); background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between;
        }
        .menu-btn { display: none; background: none; border: none; font-size: 24px; cursor: pointer; margin-right: 15px; color: var(--user-bubble); }
        .settings-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--user-bubble); }

        /* 聊天气泡 */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 75%; padding: 10px 15px; position: relative; font-size: 16px; line-height: 1.4; word-wrap: break-word; }
        .message.user { align-self: flex-end; background: var(--user-bubble); color: var(--text-light); border-radius: 20px 20px 4px 20px; }
        .message.ai { align-self: flex-start; background: var(--ai-bubble); color: var(--text-dark); border-radius: 20px 20px 20px 4px; }
        .message.ai p { margin-bottom: 8px; }
        .message.ai p:last-child { margin-bottom: 0; }
        .message.ai pre { background: #d1d1d6; padding: 10px; border-radius: 8px; overflow-x: auto; margin-top: 5px; }
        .message.ai code { font-family: monospace; }

        /* 附件预览区 */
        .attachment-preview { padding: 0 15px; display: flex; gap: 10px; overflow-x: auto; background: var(--chat-bg); }
        .attach-item { position: relative; padding: 6px 10px; background: #f0f0f0; border-radius: 6px; font-size: 12px; display: flex; align-items: center; border: 1px solid var(--border-color); margin-bottom: 10px; }
        .attach-item img { max-height: 40px; border-radius: 4px; }
        .remove-attach { position: absolute; top: -5px; right: -5px; background: #ff3b30; color: white; border: none; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* 输入区 */
        .input-area { padding: 15px 20px; border-top: 1px solid var(--border-color); display: flex; gap: 10px; background: var(--chat-bg); align-items: center; }
        .attach-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #888; }
        #msg-input { flex: 1; padding: 12px 15px; border: 1px solid var(--border-color); border-radius: 20px; font-size: 16px; outline: none; }
        #msg-input:focus { border-color: var(--user-bubble); }
        #send-btn { background: var(--user-bubble); color: white; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; font-weight: bold; flex-shrink: 0; }
        #send-btn:disabled { background: #b0c4de; cursor: not-allowed; }

        /* 弹窗通用样式 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 200; justify-content: center; align-items: center;
        }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; display: flex; flex-direction: column; }
        .modal-content h3 { margin-bottom: 15px; }
        .setting-group { margin-bottom: 15px; }
        .setting-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .setting-group input, .setting-group select, .setting-group textarea {
            width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box;
        }
        .section-title { margin: 20px 0 10px; padding-bottom: 5px; border-bottom: 1px solid var(--border-color); font-weight: bold; color: #555; font-size: 14px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .modal-actions button { padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; }
        .btn-save { background: var(--user-bubble); color: white; }
        .btn-cancel { background: #e5e5ea; }

        /* 遮罩层 (移动端用) */
        #overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 90; }

        @media (max-width: 768px) {
            #sidebar { position: fixed; top: 0; left: 0; height: 100%; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            .menu-btn { display: block; }
            #overlay.show { display: block; }
            .message { max-width: 85%; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="createNewChat()">+ 新建对话</button>
        </div>
        <div id="chat-list"></div>
        <div class="sidebar-footer">
            <input type="file" id="import-file" style="display: none;" accept=".json" onchange="importData(event)">
            <button class="footer-btn" onclick="document.getElementById('import-file').click()">📥 导入 JSON</button>
            <button class="footer-btn" onclick="exportJSON()">📤 导出 JSON</button>
            <button class="footer-btn" onclick="exportTXT()">📄 导出 TXT</button>
        </div>
    </div>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <div id="main-chat">
        <div class="chat-header">
            <div style="display: flex; align-items: center;">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <h3 id="chat-title" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;">新对话</h3>
            </div>
            <button class="settings-btn" onclick="openSettings()">⚙️ 设置</button>
        </div>
        <div id="messages"></div>
        
        <div id="attachmentPreview" class="attachment-preview"></div>
        
        <div class="input-area">
            <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg" style="display: none;" onchange="handleFileUpload(event)">
            <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="上传文档或图片">📎</button>
            <input type="text" id="msg-input" placeholder="输入消息 (按 Enter 发送)..." onkeypress="handleEnter(event)">
            <button id="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <div class="modal-overlay" id="import-modal">
        <div class="modal-content" style="max-width: 450px;">
            <h3>请选择要导入的对话</h3>
            <div id="import-chat-list" style="max-height: 350px; overflow-y: auto; margin-bottom: 15px; border: 1px solid var(--border-color); border-radius: 6px; padding: 15px; display: flex; flex-direction: column; gap: 12px;">
                </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeImportModal()">取消</button>
                <button class="btn-save" onclick="confirmImport()">确认导入</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <h3>应用设置</h3>
            <div class="section-title">安全云端同步 (GitHub Gist)</div>
            <div class="setting-group">
                <label>GitHub Token (仅勾选 gist 权限)</label>
                <input type="password" id="key-github" placeholder="ghp_...">
            </div>
            <div class="setting-group">
                <label>Gist ID (数据存放的房间号)</label>
                <input type="text" id="id-gist" placeholder="例如: 8a9b...">
            </div>

            <div class="section-title">API 配置 (全局)</div>
            <div class="setting-group">
                <label>选择服务商</label>
                <select id="provider-select" onchange="toggleCustomUrl()">
                    <option value="openai">OpenAI</option>
                    <option value="anthropic">Anthropic</option>
                    <option value="deepseek">DeepSeek</option>
                    <option value="groq">Groq</option>
                    <option value="openrouter">OpenRouter</option>
                    <option value="custom">自定义兼容接口</option>
                </select>
            </div>
            <div class="setting-group" id="custom-url-group" style="display: none;">
                <label>自定义接口 URL</label>
                <input type="text" id="custom-url" placeholder="https://api.yourdomain.com/v1/chat/completions">
            </div>
            <div class="setting-group">
                <label>API Key</label>
                <input type="password" id="api-key" placeholder="输入对应的 API Key">
            </div>
            <div class="setting-group">
                <label>模型名称 (Model)</label>
                <input type="text" id="model-name" placeholder="例如: gpt-4o">
            </div>
            <div class="setting-group">
                <label>系统提示词 (System Prompt)</label>
                <textarea id="sys-prompt" rows="3" placeholder="你是得力的AI助手..."></textarea>
            </div>
            <div class="setting-group">
                <label>Temperature (0.0 - 2.0)</label>
                <input type="number" id="temperature" step="0.1" min="0" max="2" value="0.7">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeSettings()">取消</button>
                <button class="btn-save" onclick="saveSettings()">保存</button>
            </div>
        </div>
    </div>

<script>
    // --- 状态管理 ---
    let chats = JSON.parse(localStorage.getItem('my_ai_chats')) || [];
    let currentChatId = null;
    let renamingChatId = null;
    let currentAttachments = []; 

    const defaultSettings = {
        provider: 'openai', url: '', key: '', model: 'gpt-3.5-turbo',
        systemPrompt: '你是一个乐于助人的AI助手。', temperature: 0.7,
        keys: { github: '', gistId: '' } // 新增安全密钥存储
    };
    let settings = JSON.parse(localStorage.getItem('my_ai_settings')) || defaultSettings;
    
    // 兼容旧版本设置缺失问题
    if (!settings.keys) settings.keys = { github: '', gistId: '' };

    // ================= GitHub Gist 安全云端同步 =================
    const GIST_FILENAME = 'my_ai_chats_backup.json';

    async function loadFromServer() {
        const token = settings.keys.github;
        const gistId = settings.keys.gistId;
        if (!token || !gistId) return;
        
        try {
            const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            
            const gistData = await response.json();
            const fileContent = gistData.files[GIST_FILENAME].content;
            const importedData = JSON.parse(fileContent);
            
            // 兼容纯数组和包含 folders 的对象结构
            let importedChats = Array.isArray(importedData) ? importedData : (importedData.chats || []);
            
            if (importedChats.length > 0) {
                chats = importedChats;
                console.log("✅ 已成功从 GitHub Gist 同步数据");
            }
        } catch (error) {
            console.log("❌ 连接 GitHub 失败，当前使用浏览器本地缓存。", error);
        }
    }

    async function saveToServer() {
        const token = settings.keys.github;
        const gistId = settings.keys.gistId;
        if (!token || !gistId) return;

        try {
            const dataStr = JSON.stringify(chats, null, 2);
            const payload = { files: { [GIST_FILENAME]: { content: dataStr } } };

            await fetch(`https://api.github.com/gists/${gistId}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });
            console.log("☁️ 聊天记录已自动备份至 GitHub");
        } catch (error) {
            console.error("同步到 GitHub 失败:", error);
        }
    }

    function saveChats() {
        localStorage.setItem('my_ai_chats', JSON.stringify(chats)); // 离线保险
        saveToServer(); // 静默推送到云端
    }

    // --- 页面初始化 ---
    window.onload = async () => {
        const listDiv = document.getElementById('chat-list');
        listDiv.innerHTML = '<div style="padding:10px; text-align:center; color:#888; font-size:12px;">正在同步云端数据...</div>';
        
        await loadFromServer();

        if (chats.length === 0) createNewChat();
        else {
            if (!currentChatId || !chats.find(c => c.id === currentChatId)) {
                currentChatId = chats[0].id;
            }
            renderChatList();
            renderMessages();
        }
    };

    // --- 界面控制与设置 ---
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('show');
    }

    function toggleCustomUrl() {
        const provider = document.getElementById('provider-select').value;
        document.getElementById('custom-url-group').style.display = provider === 'custom' ? 'block' : 'none';
    }

    function openSettings() {
        document.getElementById('provider-select').value = settings.provider || 'openai';
        document.getElementById('custom-url').value = settings.url || '';
        document.getElementById('api-key').value = settings.key || '';
        document.getElementById('model-name').value = settings.model || '';
        document.getElementById('sys-prompt').value = settings.systemPrompt || '';
        document.getElementById('temperature').value = settings.temperature || 0.7;
        
        document.getElementById('key-github').value = settings.keys.github || '';
        document.getElementById('id-gist').value = settings.keys.gistId || '';
        
        toggleCustomUrl();
        document.getElementById('settings-modal').style.display = 'flex';
    }

    function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }

    function saveSettings() {
        settings.provider = document.getElementById('provider-select').value;
        settings.url = document.getElementById('custom-url').value;
        settings.key = document.getElementById('api-key').value;
        settings.model = document.getElementById('model-name').value;
        settings.systemPrompt = document.getElementById('sys-prompt').value;
        settings.temperature = parseFloat(document.getElementById('temperature').value);
        
        settings.keys.github = document.getElementById('key-github').value;
        settings.keys.gistId = document.getElementById('id-gist').value;

        localStorage.setItem('my_ai_settings', JSON.stringify(settings));
        closeSettings();
        
        // 如果填入了 GitHub 密钥，自动触发一次云端同步尝试
        if (settings.keys.github && settings.keys.gistId) {
            saveToServer();
        }
    }

    // --- 聊天与重命名管理 ---
    function createNewChat() {
        const newChat = { id: Date.now().toString(), title: '新对话', messages: [] };
        chats.unshift(newChat);
        currentChatId = newChat.id;
        saveChats();
        renderChatList();
        renderMessages();
        if(window.innerWidth <= 768) toggleSidebar();
    }

    function switchChat(id) {
        currentChatId = id;
        renamingChatId = null;
        renderChatList();
        renderMessages();
        if(window.innerWidth <= 768) toggleSidebar();
    }

    function deleteChat(id, event) {
        event.stopPropagation();
        chats = chats.filter(c => c.id !== id);
        if (chats.length === 0) createNewChat();
        else if (currentChatId === id) currentChatId = chats[0].id;
        saveChats();
        renderChatList();
        renderMessages();
    }

    function startRename(id, event) {
        event.stopPropagation();
        renamingChatId = id;
        renderChatList();
        setTimeout(() => {
            const input = document.getElementById(`rename-input-${id}`);
            if(input) {
                input.focus();
                input.select();
            }
        }, 0);
    }

    function finishRename(id, event) {
        if (event) event.stopPropagation();
        const input = document.getElementById(`rename-input-${id}`);
        if (input && input.value.trim()) {
            const chat = chats.find(c => c.id === id);
            if (chat) chat.title = input.value.trim();
        }
        renamingChatId = null;
        saveChats();
        renderChatList();
        if(currentChatId === id) renderMessages();
    }

    function handleRenameKey(e, id) {
        if (e.key === 'Enter') finishRename(id, e);
    }

    function renderChatList() {
        const listDiv = document.getElementById('chat-list');
        listDiv.innerHTML = '';
        chats.forEach(chat => {
            const div = document.createElement('div');
            div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
            div.onclick = () => switchChat(chat.id);
            
            if (renamingChatId === chat.id) {
                div.innerHTML = `
                    <input type="text" id="rename-input-${chat.id}" value="${chat.title}" 
                           onblur="finishRename('${chat.id}', event)" 
                           onkeydown="handleRenameKey(event, '${chat.id}')"
                           style="width: 100%; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--user-bubble); outline: none; font-size: 14px;">
                `;
            } else {
                div.innerHTML = `
                    <span class="chat-title">${chat.title}</span>
                    <div class="chat-actions">
                        <button class="action-btn" onclick="startRename('${chat.id}', event)" title="重命名">✏️</button>
                        <button class="action-btn delete-btn" onclick="deleteChat('${chat.id}', event)" title="删除">✖</button>
                    </div>
                `;
            }
            listDiv.appendChild(div);
        });
    }

    function renderMessages() {
        const chat = chats.find(c => c.id === currentChatId);
        document.getElementById('chat-title').innerText = chat.title || '新对话';
        const msgDiv = document.getElementById('messages');
        msgDiv.innerHTML = '';
        
        chat.messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.role === 'user' ? 'user' : 'ai'}`;
            
            let mediaHtml = '';
            if (msg.attachments && msg.attachments.length > 0) {
                mediaHtml = `<div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;">` + 
                    msg.attachments.map(att => {
                        if (att.type === 'image') return `<img src="${att.data}" style="max-height: 100px; border-radius: 6px; border: 1px solid #ccc;">`;
                        else return `<div style="padding: 5px 10px; background: rgba(0,0,0,0.1); border-radius: 4px; font-size: 12px;">📄 ${att.name} (已解析)</div>`;
                    }).join('') + `</div>`;
            }
            
            const textHtml = msg.role === 'ai' ? marked.parse(msg.content) : msg.content.replace(/\n/g, '<br>');
            div.innerHTML = mediaHtml + textHtml;
            msgDiv.appendChild(div);
        });
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    // --- 文件上传与多模态 ---
    async function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const sendBtn = document.getElementById('send-btn');
        sendBtn.disabled = true; sendBtn.innerText = "⏳";

        try {
            const ext = file.name.split('.').pop().toLowerCase();
            if (['png', 'jpg', 'jpeg'].includes(ext)) {
                const base64 = await readImageAsBase64(file);
                currentAttachments.push({ type: 'image', name: file.name, data: base64 });
            } else if (ext === 'pdf') {
                const text = await readPDF(file);
                currentAttachments.push({ type: 'file', name: file.name, data: text });
            } else if (['doc', 'docx'].includes(ext)) {
                const text = await readWord(file);
                currentAttachments.push({ type: 'file', name: file.name, data: text });
            } else {
                alert("不支持的文件格式");
            }
        } catch (err) { alert("文件解析失败：" + err.message); }

        renderAttachmentPreview();
        event.target.value = ''; 
        sendBtn.disabled = false; sendBtn.innerText = "发送";
    }

    function readImageAsBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    async function readPDF(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        let fullText = "";
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            fullText += content.items.map(item => item.str).join(" ") + "\n";
        }
        return fullText;
    }

    async function readWord(file) {
        const arrayBuffer = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
        return result.value;
    }

    function removeAttachment(index) {
        currentAttachments.splice(index, 1);
        renderAttachmentPreview();
    }

    function renderAttachmentPreview() {
        const previewDiv = document.getElementById('attachmentPreview');
        previewDiv.innerHTML = currentAttachments.map((att, index) => {
            if (att.type === 'image') return `<div class="attach-item"><img src="${att.data}"><button class="remove-attach" onclick="removeAttachment(${index})">✖</button></div>`;
            else return `<div class="attach-item">📄 ${att.name}<button class="remove-attach" onclick="removeAttachment(${index})">✖</button></div>`;
        }).join('');
    }

    // --- 核心：发送消息与 API 调用 ---
    function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        
        if (!text && currentAttachments.length === 0) return;
        if (!settings.key && settings.provider !== 'custom') {
            alert("请先点击右上角【设置】配置 API Key。"); return;
        }

        const chat = chats.find(c => c.id === currentChatId);
        
        // 组装带附件的消息
        const userMsg = { role: 'user', content: text };
        if (currentAttachments.length > 0) {
            userMsg.attachments = [...currentAttachments];
            currentAttachments = [];
            renderAttachmentPreview();
        }
        chat.messages.push(userMsg);
        
        if (chat.messages.length === 1) chat.title = text ? text.substring(0, 15) : '多模态对话';
        
        input.value = '';
        saveChats();
        renderChatList();
        renderMessages();

        const sendBtn = document.getElementById('send-btn');
        sendBtn.disabled = true;

        const msgDiv = document.getElementById('messages');
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message ai';
        loadingDiv.innerText = '正在思考...';
        msgDiv.appendChild(loadingDiv);
        msgDiv.scrollTop = msgDiv.scrollHeight;

        try {
            const reply = await callAPI(chat.messages);
            loadingDiv.remove();
            chat.messages.push({ role: 'ai', content: reply });
        } catch (error) {
            loadingDiv.remove();
            chat.messages.push({ role: 'ai', content: `❌ 请求出错: ${error.message}` });
        }

        saveChats();
        renderMessages();
        sendBtn.disabled = false;
        input.focus();
    }

    async function callAPI(messages) {
        let endpoint = '';
        let headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${settings.key}` };
        let body = {};
        
        // 多模态数据处理
        let formattedMessages = messages.map(m => {
            if (m.role === 'ai') return { role: 'assistant', content: m.content };
            
            let textContent = m.content;
            let imagePayloads = [];

            if (m.attachments) {
                m.attachments.forEach(att => {
                    if (att.type === 'file') {
                        textContent = `[附加文档内容: ${att.name}]\n${att.data}\n[结束]\n\n` + textContent;
                    } else if (att.type === 'image') {
                        if (settings.provider === 'anthropic') {
                            const parts = att.data.split(',');
                            const mime = parts[0].match(/:(.*?);/)[1];
                            imagePayloads.push({ type: 'image', source: { type: 'base64', media_type: mime, data: parts[1] } });
                        } else {
                            imagePayloads.push({ type: 'image_url', image_url: { url: att.data } });
                        }
                    }
                });
            }

            if (imagePayloads.length > 0) {
                if (settings.provider === 'anthropic') return { role: 'user', content: [...imagePayloads, { type: 'text', text: textContent || "请描述图片" }] };
                else return { role: 'user', content: [{ type: 'text', text: textContent || "请描述图片" }, ...imagePayloads] };
            }
            return { role: 'user', content: textContent };
        });

        if (settings.provider === 'anthropic') {
            endpoint = 'https://api.anthropic.com/v1/messages';
            headers['x-api-key'] = settings.key;
            headers['anthropic-version'] = '2023-06-01';
            headers['anthropic-dangerously-allow-browser'] = 'true';
            delete headers['Authorization'];
            
            body = {
                model: settings.model || 'claude-3-opus-20240229',
                system: settings.systemPrompt,
                messages: formattedMessages,
                max_tokens: 4096,
                temperature: settings.temperature
            };
        } else {
            let finalMessages = [{ role: 'system', content: settings.systemPrompt }, ...formattedMessages];

            if (settings.provider === 'openai') endpoint = 'https://api.openai.com/v1/chat/completions';
            else if (settings.provider === 'deepseek') endpoint = 'https://api.deepseek.com/chat/completions';
            else if (settings.provider === 'groq') endpoint = 'https://api.groq.com/openai/v1/chat/completions';
            else if (settings.provider === 'openrouter') {
                endpoint = 'https://openrouter.ai/api/v1/chat/completions';
                headers['HTTP-Referer'] = window.location.href;
                headers['X-Title'] = 'My AI Client';
            }
            else if (settings.provider === 'custom') endpoint = settings.url;

            body = {
                model: settings.model || 'gpt-3.5-turbo',
                messages: finalMessages,
                temperature: settings.temperature
            };
        }

        const response = await fetch(endpoint, { method: 'POST', headers: headers, body: JSON.stringify(body) });
        const data = await response.json();

        if (!response.ok) throw new Error(data.error?.message || `HTTP ${response.status}`);
        if (settings.provider === 'anthropic') return data.content[0].text;
        else return data.choices[0].message.content;
    }

    // --- 数据导入导出 (包含可视化弹窗选择) ---
    let pendingImportChats = [];
    
    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const parsedData = JSON.parse(e.target.result);
                pendingImportChats = Array.isArray(parsedData) ? parsedData : (parsedData.chats || []);
                
                if (pendingImportChats.length === 0) { alert("该文件中没有找到任何对话！"); return; }

                const listContainer = document.getElementById('import-chat-list');
                listContainer.innerHTML = '';
                
                pendingImportChats.forEach(chat => {
                    const isExist = chats.some(c => c.id === chat.id);
                    const div = document.createElement('div');
                    div.innerHTML = `
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; ${isExist ? 'color: #999;' : ''}">
                            <input type="checkbox" value="${chat.id}" class="import-cb" ${isExist ? 'disabled' : 'checked'}>
                            <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                                ${chat.title} <span style="font-size:12px; color:#888;">(${chat.messages.length}条消息)</span>
                                ${isExist ? ' <span style="color:#ff3b30; font-size:12px; font-weight:bold;">[已存在]</span>' : ''}
                            </span>
                        </label>
                    `;
                    listContainer.appendChild(div);
                });

                document.getElementById('import-modal').style.display = 'flex';
            } catch (err) { alert("导入失败：文件格式不正确！"); }
            event.target.value = ''; 
        };
        reader.readAsText(file);
    }

    function closeImportModal() {
        document.getElementById('import-modal').style.display = 'none';
        pendingImportChats = [];
    }

    function confirmImport() {
        const checkboxes = document.querySelectorAll('.import-cb:checked');
        const selectedIds = Array.from(checkboxes).map(cb => cb.value);
        
        if (selectedIds.length === 0) { alert("未选择任何对话！"); return; }

        let addedCount = 0;
        const existingChatIds = new Set(chats.map(c => c.id));

        pendingImportChats.forEach(chat => {
            if (selectedIds.includes(chat.id) && !existingChatIds.has(chat.id)) {
                chats.push(chat);
                addedCount++;
            }
        });
        
        chats.sort((a, b) => parseInt(b.id) - parseInt(a.id));
        saveChats();
        renderChatList();
        closeImportModal();
        alert(`成功导入 ${addedCount} 条对话记录！`);
    }

    function exportJSON() {
        const dataStr = JSON.stringify(chats, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `AI_Chats_Backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click(); URL.revokeObjectURL(url);
    }

    function exportTXT() {
        let txtData = '';
        chats.forEach(chat => {
            txtData += `========== 对话: ${chat.title} ==========\n\n`;
            chat.messages.forEach(msg => {
                const roleName = msg.role === 'user' ? '我' : 'AI';
                txtData += `[${roleName}]:\n${msg.content}\n`;
                if (msg.attachments) msg.attachments.forEach(att => { txtData += `[附件: ${att.name}]\n`; });
                txtData += `\n`;
            });
            txtData += `----------------------------------------\n\n`;
        });
        const blob = new Blob([txtData], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `AI_Chats_${new Date().toISOString().slice(0,10)}.txt`;
        a.click(); URL.revokeObjectURL(url);
    }
</script>
